on:
  push:
    branches:
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          check-latest: true
        if: ${{ steps.release.outputs.release_created }}
      - run: npm install -g npm@latest
        if: ${{ steps.release.outputs.release_created }}
      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      - run: npm publish
        if: ${{ steps.release.outputs.release_created }}

  build-and-deploy-demo:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set Node Environment
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          check-latest: true

      - name: Update npm latest
        run: |
          npm install -g npm@latest

      - name: Install and Build 🔧
        env:
          CI: false
        run: |
          npm install
          npm run build:demo

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: dist # The folder the action should deploy.

  generate-badge:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: read
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set Node Environment
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          check-latest: true

      - name: Update npm latest
        run: |
          npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run Coverage test
        run: |
          SUMMARY="$(npm run test:coverage-ci | tail -2 | head -1)"
          TOKENS=($SUMMARY)
          echo "COVERAGE=$(echo ${TOKENS[2]})" >> $GITHUB_ENV
          echo "COVERAGE_VAL=$(echo ${TOKENS[2]}  | sed 's/.$//')" >> $GITHUB_ENV

      - name: Create the Coverage Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 83c2a74197bb80b661019a2747e71daa
          filename: mui-image-alter_coverage__main.json
          label: coverage
          message: ${{ env.COVERAGE }}
          style: flat-square
          maxColorRange: 90
          minColorRange: 50
          valColorRange: ${{ env.COVERAGE_VAL }}
          namedLogo: vitest
